<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    
    <main>

<div class="top">
        <div class="upper">
        <div class="logo">🌥️Weather App</div>
        <div class="links">
       <a href="weather.html">Weather</a>
       <a href="settings.html">Settings</a>
       </div> 
       </div>
       </div>

        <h2>Settings</h2>
        <div class="cover">
        <div class="select">
            <h3><i class="fa-solid fa-temperature-half"></i>Temperatur Units</h3>
            <select id="temp">
                <option value="metric">°C (Celsius)</option>
                <option value="imperial">°F (Fahrenheit)</option>
            </select>
         </div>

        <div class="select">
            <h3><i class="fa-solid fa-wind"></i>Wind Speed Units</h3>
            <select id="wind">
                <option value="m/s">m/s</option>
                <option value="km/h">km/h</option>
            </select>
         </div>

        <div class="select">
            <h3><i class="fa-solid fa-moon"></i>Theme</h3>
            <select id="theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>

        <div class="select">
            <h3><i class="fa-solid fa-language"></i>Language</h3>
            <select id="language">
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ar">Arabic</option>
            </select>
        </div>
           <button id="saveBtn">Save Changes</button>
        </div>
    </main>
    <script src="settings.js"></script>
</body>
</html>
