<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <main>

      <div class="top">
        <div class="upper">
        <div class="logo">🌥️Weather App</div>
        <div class="links">
       <a href="weather.html">Weather</a>
       <a href="settings.html">Settings</a>
       </div> 
       </div>
       

        
       <div class="searchbox">
       <input type="text" id="input" placeholder="Enter City">
       <button id="clearbtn"><i class="fa-solid fa-xmark"></i></button>
       <button id="btn">Search</button>
       </div>

       
       </div>
       
     
     
    <div class="flex">
     <div class="details">
        <div id="place">Lagos, NG </div>
        <div class="detail">
        <div id="temp">40°C</div>
        <img src="" id="icon">
        <p id="para">partly cloudy</p>
        
        <div class="cards">
      <div class="fee-card">
        <h4>Feels Like</h4>
        <div id="fee">30°C</div>
      </div>
      
      <div class="hum-card">
        <h4>Humidity</h4>
        <div id="hum">50%</div>
      </div>
      
      <div class="win-card">
        <h4>Wind Speed</h4>
        <div id="win">10 km/h</div>
      </div>
    </div>
        </div>
     </div>

     <div class="forecast">
        <div class="hourly">
         <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>

          <div class="hour-card">
          <div class="hour">1 AM</div>
          <img src="" class="hour-icon">
          <div class="hour-temp">30°C</div>
         </div>
        </div>

        <div class="daily">
         <div class="day-card">
          <div class="day">Mon</div>
          <img src="" class="day-icon">
          <div class="day-temp">30°C</div>
         </div>

         <div class="day-card">
          <div class="day">Tue</div>
          <img src="" class="day-icon">
          <div class="day-temp">30°C</div>
         </div>

         <div class="day-card">
          <div class="day">Wed</div>
          <img src="" class="day-icon">
          <div class="day-temp">30°C</div>
         </div>

         <div class="day-card">
          <div class="day">Thu</div>
          <img src="" class="day-icon">
          <div class="day-temp">30°C</div>
         </div>

         <div class="day-card">
          <div class="day">Fri</div>
          <img src="" class="day-icon">
          <div class="day-temp">30°C</div>
         </div>
        </div>
     </div>
    </div>
    </main>
    <script src="weather.js"></script>
</body>
</html>
